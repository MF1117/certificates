<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Credential Wall</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script>pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<style>
  :root{
    --wall:        #2B3A3A;
    --wall-dark:   #233030;
    --brass:       #B08D57;
    --brass-light: #D8BD8A;
    --parchment:   #F2EAD8;
    --ink:         #2A2A28;
    --ink-soft:    #5C5650;
    --seal:        #8B3A3A;
    --shadow:      rgba(0,0,0,0.45);
  }

  *{ box-sizing: border-box; }

  body{
    margin:0;
    min-height:100vh;
    background:
      repeating-linear-gradient(
        90deg,
        var(--wall) 0px, var(--wall) 78px,
        var(--wall-dark) 78px, var(--wall-dark) 80px
      );
    font-family:'Inter', sans-serif;
    color: var(--parchment);
  }

  header{
    max-width: 920px;
    margin: 0 auto;
    padding: 64px 24px 32px;
    text-align:center;
  }
  .eyebrow{
    font-family:'JetBrains Mono', monospace;
    font-size: 12px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--brass-light);
    margin: 0 0 14px;
  }
  h1{
    font-family:'Cormorant Garamond', serif;
    font-weight: 600;
    font-size: clamp(34px, 6vw, 56px);
    margin: 0 0 12px;
    color: var(--parchment);
  }
  header p.sub{
    font-size: 15px;
    color: #B9C2C2;
    max-width: 560px;
    margin: 0 auto;
    line-height: 1.6;
  }

  .gallery{
    max-width: 1180px;
    margin: 0 auto;
    padding: 24px 32px 100px;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 56px 40px;
  }

  .frame{
    --tilt: 0deg;
    position: relative;
    cursor: pointer;
    background: linear-gradient(160deg, var(--brass-light), var(--brass) 55%, #8E6E3E);
    padding: 10px;
    border-radius: 3px;
    transform: rotate(var(--tilt));
    box-shadow:
      0 18px 30px -10px var(--shadow),
      0 2px 4px rgba(0,0,0,0.3);
    transition: transform 0.45s cubic-bezier(.2,.8,.2,1), box-shadow 0.45s ease;
    opacity: 0;
    animation: hang 0.7s cubic-bezier(.2,.8,.2,1) forwards;
  }
  .frame::before{
    content:'';
    position:absolute;
    top:-22px;
    left:50%;
    width:1px;
    height:22px;
    background: rgba(0,0,0,0.35);
    transform: translateX(-50%) rotate(calc(var(--tilt) * -1));
    transform-origin: bottom center;
  }
  .frame:nth-child(odd){ --tilt: -1.6deg; }
  .frame:nth-child(3n){ --tilt: 1.4deg; }
  .frame:nth-child(5n){ --tilt: -0.6deg; }

  .frame:hover, .frame:focus-visible{
    transform: rotate(0deg) translateY(-6px) scale(1.02);
    box-shadow:
      0 30px 40px -12px var(--shadow),
      0 4px 6px rgba(0,0,0,0.35);
  }
  .frame:focus-visible{ outline: 2px solid var(--brass-light); outline-offset: 4px; }

  .frame-inner{
    background: var(--ink);
    padding: 6px;
    border-radius: 2px;
  }
  .frame canvas, .frame img{
    display:block;
    width: 100%;
    aspect-ratio: 4 / 3;
    object-fit: cover;
    border-radius: 1px;
    background: var(--parchment);
  }
  .frame canvas{ height: auto; }

  .pdf-loading{
    display: flex;
    align-items: center;
    justify-content: center;
    aspect-ratio: 4 / 3;
    background: var(--parchment);
    border-radius: 1px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--ink-soft);
    letter-spacing: 0.05em;
  }

  .plaque{
    margin-top: 10px;
    text-align:center;
    padding: 6px 4px 2px;
  }
  .plaque .title{
    font-family:'Cormorant Garamond', serif;
    font-weight: 600;
    font-style: italic;
    font-size: 17px;
    color: #1E1B16;
    line-height: 1.25;
  }
  .plaque .meta{
    font-family:'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.06em;
    color: #5A4626;
    text-transform: uppercase;
    margin-top: 3px;
  }

  @keyframes hang{
    from{ opacity:0; transform: translateY(-18px) rotate(var(--tilt)); }
    to{ opacity:1; transform: translateY(0) rotate(var(--tilt)); }
  }
  .frame:nth-child(1){ animation-delay: 0.05s; }
  .frame:nth-child(2){ animation-delay: 0.12s; }
  .frame:nth-child(3){ animation-delay: 0.19s; }
  .frame:nth-child(4){ animation-delay: 0.26s; }
  .frame:nth-child(5){ animation-delay: 0.33s; }
  .frame:nth-child(6){ animation-delay: 0.40s; }

  /* ---------- Download button on card ---------- */
  .dl-btn{
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    margin: 8px 4px 4px;
    padding: 7px 10px;
    background: var(--ink);
    color: var(--brass-light);
    border: 1px solid var(--brass);
    border-radius: 3px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    text-decoration: none;
    cursor: pointer;
    transition: background 0.2s ease, color 0.2s ease;
  }
  .dl-btn:hover{ background: var(--brass); color: var(--ink); }
  .dl-btn.disabled{
    opacity: 0.35;
    cursor: not-allowed;
    pointer-events: none;
  }

  /* ---------- Modal ---------- */
  .modal-backdrop{
    position: fixed;
    inset: 0;
    background: rgba(10,14,14,0.7);
    backdrop-filter: blur(3px);
    display:flex;
    align-items:center;
    justify-content:center;
    padding: 24px;
    opacity: 0;
    pointer-events:none;
    transition: opacity 0.3s ease;
    z-index: 50;
  }
  .modal-backdrop.open{ opacity:1; pointer-events:auto; }

  .modal{
    background: linear-gradient(160deg, var(--brass-light), var(--brass) 55%, #8E6E3E);
    padding: 14px;
    border-radius: 4px;
    max-width: 720px;
    width: 100%;
    max-height: 88vh;
    overflow-y: auto;
    transform: scale(0.85) rotate(-2deg);
    transition: transform 0.4s cubic-bezier(.2,.8,.2,1);
    box-shadow: 0 40px 70px -20px rgba(0,0,0,0.6);
    position: relative;
  }
  .modal-backdrop.open .modal{ transform: scale(1) rotate(0deg); }

  .modal-inner{
    background: var(--ink);
    padding: 8px;
    border-radius: 3px;
  }
  .modal-inner canvas, .modal-inner img{
    display:block;
    width:100%;
    border-radius: 2px;
    background: var(--parchment);
  }

  .modal-plaque{
    background: var(--parchment);
    margin-top: 10px;
    border-radius: 3px;
    padding: 22px 26px 24px;
    position: relative;
  }
  .modal-plaque .seal{
    position:absolute;
    top:-16px; right: 22px;
    width: 34px; height: 34px;
    border-radius:50%;
    background: var(--seal);
    border: 2px solid var(--brass-light);
    box-shadow: 0 4px 8px rgba(0,0,0,0.35);
  }
  .modal-plaque .title{
    font-family:'Cormorant Garamond', serif;
    font-weight: 600;
    font-size: 26px;
    color: var(--ink);
    margin: 0 0 4px;
    padding-right: 50px;
  }
  .modal-plaque .meta{
    font-family:'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--ink-soft);
    margin: 0 0 14px;
  }
  .modal-plaque .blurb{
    font-size: 14.5px;
    line-height: 1.65;
    color: var(--ink);
    margin: 0;
  }
  .modal-dl-btn{
    display: inline-flex;
    align-items: center;
    gap: 8px;
    margin-top: 18px;
    padding: 10px 20px;
    background: var(--ink);
    color: var(--brass-light);
    border: 1.5px solid var(--brass);
    border-radius: 3px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    text-decoration: none;
    transition: background 0.2s ease, color 0.2s ease;
  }
  .modal-dl-btn:hover{ background: var(--brass); color: var(--ink); }
  .modal-dl-btn.hidden{ display: none; }

  .close-btn{
    position:absolute;
    top: -14px; left: -14px;
    width: 32px; height: 32px;
    border-radius: 50%;
    border: none;
    background: var(--ink);
    color: var(--parchment);
    font-size: 16px;
    cursor:pointer;
    display:flex;
    align-items:center;
    justify-content:center;
    box-shadow: 0 4px 10px rgba(0,0,0,0.4);
    transition: background 0.2s ease;
  }
  .close-btn:hover{ background: var(--seal); }

  footer{
    text-align:center;
    font-family:'JetBrains Mono', monospace;
    font-size: 11px;
    color: #6E7A7A;
    padding: 0 24px 48px;
  }

  @media (prefers-reduced-motion: reduce){
    .frame, .modal, .modal-backdrop{ transition:none; animation:none; opacity:1; }
  }
</style>
</head>
<body>

<header>
  <p class="eyebrow">Credential Wall</p>
  <h1>My Certificates</h1>
  <p class="sub">A collection of things I've studied, finished, and earned. Click any frame to take a closer look.</p>
</header>

<main class="gallery" id="gallery"></main>

<div class="modal-backdrop" id="backdrop">
  <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modal-title">
    <button class="close-btn" id="closeBtn" aria-label="Close">✕</button>
    <div class="modal-inner">
      <canvas id="modalCanvas" style="display:none;"></canvas>
      <img id="modalImg" src="" alt="" style="display:none;">
    </div>
    <div class="modal-plaque">
      <div class="seal"></div>
      <h2 class="title" id="modal-title"></h2>
      <p class="meta" id="modalMeta"></p>
      <p class="blurb" id="modalBlurb"></p>
      <a id="modalDlBtn" class="modal-dl-btn hidden" href="#" download>
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M7 1v8M4 6l3 3 3-3M2 11h10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
        Download PDF
      </a>
    </div>
  </div>
</div>

<footer>Hosted on GitHub Pages</footer>

<script>
/* ================================================================
   EDIT THIS DATA ARRAY to add your own certificates.

   For each certificate:
   - title:  name of the certificate
   - issuer: who gave it to you
   - date:   year you earned it
   - blurb:  a sentence or two about it
   - accent: a hex colour for the frame tint
   - pdf:    path to your PDF in the certs/ folder
             e.g. "certs/myfile.pdf"
             REMOVE this line if you haven't uploaded a PDF yet.

   To add more certificates, copy one block and paste it
   after the last one (before the closing ] ).
   ================================================================ */
const DATA = [
  {
    title: "Cloud Computing Certificate",
    issuer: "Your Issuer Here",
    date: "2024",
    blurb: "Replace this with a sentence or two about what this certificate covers and what you learned from it.",
    accent: "#B08D57",
    pdf: "certs/cloud1.pdf"
  },
  {
    title: "Add Your Next Certificate",
    issuer: "Issuer Name",
    date: "2024",
    blurb: "Upload the PDF to your certs/ folder, update the title, issuer, date, and blurb, then add: pdf: \"certs/yourfile.pdf\"",
    accent: "#8B3A3A"
    // no pdf: line yet — upload the PDF first, then add it
  },
  {
    title: "Add Your Next Certificate",
    issuer: "Issuer Name",
    date: "2024",
    blurb: "Upload the PDF to your certs/ folder, update the title, issuer, date, and blurb, then add: pdf: \"certs/yourfile.pdf\"",
    accent: "#3D5A5A"
  },
  {
    title: "Add Your Next Certificate",
    issuer: "Issuer Name",
    date: "2024",
    blurb: "Upload the PDF to your certs/ folder, update the title, issuer, date, and blurb, then add: pdf: \"certs/yourfile.pdf\"",
    accent: "#6B5B3E"
  }
];

/* ================================================================
   NO NEED TO EDIT BELOW THIS LINE
   ================================================================ */

function placeholderSVG(title, issuer, accent){
  const safe = (s) => s.replace(/&/g,'&amp;').replace(/</g,'&lt;');
  return 'data:image/svg+xml;utf8,' + encodeURIComponent(`
    <svg xmlns="http://www.w3.org/2000/svg" width="600" height="450">
      <rect width="600" height="450" fill="#F2EAD8"/>
      <rect x="18" y="18" width="564" height="414" fill="none" stroke="${accent}" stroke-width="3"/>
      <rect x="30" y="30" width="540" height="390" fill="none" stroke="${accent}" stroke-width="1"/>
      <circle cx="300" cy="150" r="34" fill="none" stroke="${accent}" stroke-width="2"/>
      <text x="300" y="158" font-family="Georgia,serif" font-size="26" fill="${accent}" text-anchor="middle">★</text>
      <text x="300" y="230" font-family="Georgia,serif" font-size="20" fill="#2A2A28" text-anchor="middle">${safe(title)}</text>
      <text x="300" y="262" font-family="Georgia,serif" font-size="12" fill="#5C5650" text-anchor="middle" letter-spacing="1">${safe(issuer.toUpperCase())}</text>
      <line x1="220" y1="296" x2="380" y2="296" stroke="${accent}" stroke-width="1"/>
      <text x="300" y="316" font-family="Georgia,serif" font-size="10" fill="#5C5650" text-anchor="middle">PDF NOT YET UPLOADED</text>
    </svg>
  `);
}

async function renderPdfToCanvas(pdfUrl, canvas, scale) {
  try {
    const pdf = await pdfjsLib.getDocument(pdfUrl).promise;
    const page = await pdf.getPage(1);
    const viewport = page.getViewport({ scale });
    canvas.width = viewport.width;
    canvas.height = viewport.height;
    await page.render({ canvasContext: canvas.getContext('2d'), viewport }).promise;
  } catch(e) {
    console.warn('PDF render failed for', pdfUrl, e);
  }
}

const dlIcon = `<svg width="11" height="11" viewBox="0 0 14 14" fill="none"><path d="M7 1v8M4 6l3 3 3-3M2 11h10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>`;

const gallery    = document.getElementById('gallery');
const backdrop   = document.getElementById('backdrop');
const modalCanvas= document.getElementById('modalCanvas');
const modalImg   = document.getElementById('modalImg');
const modalTitle = document.getElementById('modal-title');
const modalMeta  = document.getElementById('modalMeta');
const modalBlurb = document.getElementById('modalBlurb');
const modalDlBtn = document.getElementById('modalDlBtn');
const closeBtn   = document.getElementById('closeBtn');
let lastFocused  = null;

DATA.forEach((cert) => {
  const hasPdf  = !!cert.pdf;
  const hasImage= !!cert.image;
  const accent  = cert.accent || '#B08D57';

  const frame = document.createElement('div');
  frame.className = 'frame';
  frame.tabIndex = 0;
  frame.setAttribute('role', 'button');
  frame.setAttribute('aria-label', `View certificate: ${cert.title}`);

  let thumbHTML;
  if (hasPdf && !hasImage) {
    thumbHTML = `<div class="pdf-loading">Loading…</div><canvas class="pdf-thumb" style="display:none;width:100%;border-radius:1px;"></canvas>`;
  } else {
    const src = cert.image || placeholderSVG(cert.title, cert.issuer, accent);
    thumbHTML = `<img src="${src}" alt="${cert.title} thumbnail" loading="lazy">`;
  }

  frame.innerHTML = `
    <div class="frame-inner">${thumbHTML}</div>
    <div class="plaque">
      <div class="title">${cert.title}</div>
      <div class="meta">${cert.issuer} · ${cert.date}</div>
    </div>
    ${hasPdf
      ? `<a class="dl-btn" href="${cert.pdf}" download>${dlIcon} Download PDF</a>`
      : `<span class="dl-btn disabled">${dlIcon} No PDF yet</span>`}
  `;

  if (hasPdf && !hasImage) {
    const thumbCanvas = frame.querySelector('.pdf-thumb');
    const loader = frame.querySelector('.pdf-loading');
    renderPdfToCanvas(cert.pdf, thumbCanvas, 1.2).then(() => {
      if (loader) loader.remove();
      thumbCanvas.style.display = 'block';
    });
  }

  const dlEl = frame.querySelector('a.dl-btn');
  if (dlEl) dlEl.addEventListener('click', (e) => e.stopPropagation());

  function openModal() {
    lastFocused = document.activeElement;
    modalTitle.textContent = cert.title;
    modalMeta.textContent  = `${cert.issuer} · ${cert.date}`;
    modalBlurb.textContent = cert.blurb;

    if (hasPdf && !hasImage) {
      modalImg.style.display    = 'none';
      modalCanvas.style.display = 'block';
      renderPdfToCanvas(cert.pdf, modalCanvas, 2.5);
    } else {
      const src = cert.image || placeholderSVG(cert.title, cert.issuer, accent);
      modalCanvas.style.display = 'none';
      modalImg.style.display    = 'block';
      modalImg.src = src;
      modalImg.alt = cert.title;
    }

    if (hasPdf) {
      modalDlBtn.href     = cert.pdf;
      modalDlBtn.download = cert.pdf.split('/').pop();
      modalDlBtn.classList.remove('hidden');
    } else {
      modalDlBtn.classList.add('hidden');
    }

    backdrop.classList.add('open');
    closeBtn.focus();
  }

  frame.addEventListener('click', openModal);
  frame.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); openModal(); }
  });

  gallery.appendChild(frame);
});

function closeModal() {
  backdrop.classList.remove('open');
  if (lastFocused) lastFocused.focus();
}
closeBtn.addEventListener('click', closeModal);
backdrop.addEventListener('click', (e) => { if (e.target === backdrop) closeModal(); });
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape' && backdrop.classList.contains('open')) closeModal();
});
</script>
</body>
</html>
