<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Certificates — Malakye Frost</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script>pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:          #100D0A;
    --surface:     #1A1512;
    --surface-rgb: 26, 21, 18;
    --surface-2:   #15110D;
    --border:      #332A22;
    --text:        #F1E9DD;
    --text-muted:  #9C9085;
    --accent:      #FFB454;
    --accent-dim:  #C98A33;
    --mono: "JetBrains Mono", "SF Mono", monospace;
    --sans: "Inter", system-ui, -apple-system, sans-serif;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
  }

  a { color: var(--accent); text-decoration: none; }
  a:hover { text-decoration: underline; }
  :focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }

  .wrap {
    max-width: 900px;
    margin: 0 auto;
    padding: 64px 20px 80px;
  }

  /* ── Header ── */
  .page-header {
    margin-bottom: 40px;
  }
  .back-link {
    font-family: var(--mono);
    font-size: 12px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--text-muted);
    display: inline-flex;
    align-items: center;
    gap: 6px;
    margin-bottom: 24px;
    transition: color 0.2s;
  }
  .back-link:hover { color: var(--accent); text-decoration: none; }

  .heading {
    font-family: var(--mono);
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--accent-dim);
    margin: 0 0 10px;
  }
  h1 {
    font-family: var(--sans);
    font-weight: 700;
    font-size: 28px;
    letter-spacing: -0.01em;
    color: var(--text);
    margin: 0 0 10px;
  }
  .sub {
    font-size: 15px;
    color: var(--text-muted);
    line-height: 1.7;
    margin: 0;
  }

  /* ── Grid ── */
  .gallery {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 16px;
    margin-top: 32px;
  }

  /* ── Card ── */
  .cert-card {
    background: rgba(var(--surface-rgb), 0.72);
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
    cursor: pointer;
    transition: border-color 0.2s ease, transform 0.2s ease, box-shadow 0.2s ease;
    display: flex;
    flex-direction: column;
  }
  .cert-card:hover {
    border-color: var(--accent-dim);
    transform: translateY(-3px);
    box-shadow: 0 12px 32px rgba(0,0,0,0.4);
  }
  .cert-card:focus-visible {
    outline: 2px solid var(--accent);
    outline-offset: 2px;
  }

  .card-thumb {
    width: 100%;
    aspect-ratio: 4 / 3;
    background: var(--surface-2);
    overflow: hidden;
    position: relative;
  }
  .card-thumb canvas,
  .card-thumb img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }
  .card-thumb canvas { height: auto; aspect-ratio: unset; }

  .pdf-loading {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-muted);
    letter-spacing: 0.06em;
  }

  .card-body {
    padding: 16px 18px 18px;
    display: flex;
    flex-direction: column;
    flex: 1;
  }

  .card-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 8px;
  }

  .type-badge {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    padding: 3px 8px;
    border-radius: 3px;
    border: 1px solid rgba(255,180,84,0.35);
    color: var(--accent);
    background: rgba(255,180,84,0.08);
  }

  .card-date {
    font-family: var(--mono);
    font-size: 10.5px;
    color: var(--text-muted);
  }

  .card-title {
    font-family: var(--mono);
    font-size: 14px;
    font-weight: 600;
    color: var(--text);
    margin: 0 0 4px;
    line-height: 1.35;
  }

  .card-issuer {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-muted);
    margin: 0 0 14px;
  }

  .dl-btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    margin-top: auto;
    padding: 7px 12px;
    border: 1px solid var(--border);
    border-radius: 4px;
    background: var(--surface-2);
    color: var(--text-muted);
    font-family: var(--mono);
    font-size: 10.5px;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    text-decoration: none;
    cursor: pointer;
    transition: border-color 0.2s, color 0.2s, background 0.2s;
    align-self: flex-start;
  }
  .dl-btn:hover {
    border-color: var(--accent-dim);
    color: var(--accent);
    background: rgba(255,180,84,0.08);
    text-decoration: none;
  }
  .dl-btn.disabled {
    opacity: 0.35;
    cursor: not-allowed;
    pointer-events: none;
  }

  /* ── Modal ── */
  .modal-backdrop {
    position: fixed;
    inset: 0;
    background: rgba(10, 8, 6, 0.82);
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.25s ease;
    z-index: 50;
  }
  .modal-backdrop.open { opacity: 1; pointer-events: auto; }

  .modal {
    background: rgba(var(--surface-rgb), 0.95);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid var(--border);
    border-radius: 12px;
    max-width: 700px;
    width: 100%;
    max-height: 90vh;
    overflow-y: auto;
    transform: scale(0.95) translateY(10px);
    transition: transform 0.3s cubic-bezier(.2,.8,.2,1);
    scrollbar-width: none;
  }
  .modal::-webkit-scrollbar { display: none; }
  .modal-backdrop.open .modal { transform: scale(1) translateY(0); }

  .modal-img-wrap {
    width: 100%;
    background: var(--surface-2);
    border-radius: 11px 11px 0 0;
    overflow: hidden;
  }
  .modal-img-wrap canvas,
  .modal-img-wrap img {
    width: 100%;
    display: block;
  }

  .modal-body {
    padding: 24px 28px 28px;
  }

  .modal-top {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 12px;
    margin-bottom: 6px;
  }

  .modal-title {
    font-family: var(--sans);
    font-weight: 700;
    font-size: 22px;
    color: var(--text);
    margin: 0;
    line-height: 1.25;
  }

  .modal-meta {
    font-family: var(--mono);
    font-size: 11.5px;
    color: var(--text-muted);
    margin: 0 0 16px;
    padding-top: 4px;
  }

  .modal-blurb {
    font-size: 14.5px;
    line-height: 1.75;
    color: var(--text);
    margin: 0 0 20px;
    border-top: 1px solid var(--border);
    padding-top: 16px;
  }

  .modal-dl-btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 9px 18px;
    border: 1px solid var(--border);
    border-radius: 5px;
    background: var(--surface-2);
    color: var(--text-muted);
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    text-decoration: none;
    transition: border-color 0.2s, color 0.2s, background 0.2s;
  }
  .modal-dl-btn:hover {
    border-color: var(--accent-dim);
    color: var(--accent);
    background: rgba(255,180,84,0.08);
    text-decoration: none;
  }
  .modal-dl-btn.hidden { display: none; }

  /* Close button — fixed top-right, always visible */
  .close-btn {
    position: fixed;
    top: 18px;
    right: 18px;
    z-index: 100;
    width: 40px;
    height: 40px;
    border-radius: 50%;
    border: 1px solid var(--border);
    background: rgba(var(--surface-rgb), 0.9);
    backdrop-filter: blur(8px);
    color: var(--text-muted);
    font-size: 18px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 4px 14px rgba(0,0,0,0.5);
    transition: border-color 0.2s, color 0.2s, background 0.2s;
  }
  .close-btn:hover {
    border-color: var(--accent-dim);
    color: var(--accent);
    background: var(--surface);
  }

  /* ── Footer ── */
  footer {
    margin-top: 64px;
    text-align: center;
    font-family: var(--mono);
    font-size: 11.5px;
    color: var(--text-muted);
  }

  @media (max-width: 560px) {
    .wrap { padding: 44px 16px 64px; }
    h1 { font-size: 22px; }
    .modal-body { padding: 18px 18px 22px; }
    .modal-title { font-size: 18px; }
  }

  @media (prefers-reduced-motion: reduce) {
    .cert-card, .modal, .modal-backdrop { transition: none; }
  }
</style>
</head>
<body>

<div class="wrap">

  <div class="page-header">
    <p class="heading">Credentials</p>
    <h1>My Certificates</h1>
    <p class="sub">A collection of things I've studied, finished, and earned. Click any card to take a closer look.</p>
  </div>

  <main class="gallery" id="gallery"></main>

  <footer>Malakye Frost · Hosted on GitHub Pages</footer>

</div>

<!-- Modal -->
<div class="modal-backdrop" id="backdrop">
  <button class="close-btn" id="closeBtn" aria-label="Close">✕</button>
  <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modal-title">
    <div class="modal-img-wrap">
      <canvas id="modalCanvas" style="display:none;"></canvas>
      <img id="modalImg" src="" alt="" style="display:none;">
    </div>
    <div class="modal-body">
      <div class="modal-top">
        <h2 class="modal-title" id="modal-title"></h2>
      </div>
      <p class="modal-meta" id="modalMeta"></p>
      <p class="modal-blurb" id="modalBlurb"></p>
      <a id="modalDlBtn" class="modal-dl-btn hidden" href="#" download>
        <svg width="13" height="13" viewBox="0 0 14 14" fill="none"><path d="M7 1v8M4 6l3 3 3-3M2 11h10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
        Download PDF
      </a>
    </div>
  </div>
</div>

<script>
/* ================================================================
   EDIT THIS DATA ARRAY to add your own certificates.

   For each certificate:
   - title:  name of the certificate
   - issuer: who gave it to you
   - date:   when you earned it
   - blurb:  a sentence or two about it
   - pdf:    path to your PDF in the certs/ folder
             e.g. "certs/myfile.pdf"
             Remove this line if you have not uploaded a PDF yet.

   To add more: copy one block, paste it after the last one,
   fill in your details, done.
   ================================================================ */
const DATA = [
  {
    title: "Builder Labs: Introduction to AWS Cloud",
    issuer: "AWS Training & Certification",
    date: "June 2026",
    blurb: "Completed hands-on Builder Labs covering the fundamentals of AWS Cloud — including core services, cloud architecture, and real-world infrastructure tasks. Awarded by AWS Training & Certification and signed by Michelle Vaz, Director of AWS Training & Certification.",
    pdf: "certs/cloud1.pdf"
  },
  {
    title: "Add Your Next Certificate",
    issuer: "Issuer Name",
    date: "2024",
    blurb: "Upload the PDF to your certs/ folder, update the title, issuer, date, and blurb, then add: pdf: \"certs/yourfile.pdf\""
  },
  {
    title: "Add Your Next Certificate",
    issuer: "Issuer Name",
    date: "2024",
    blurb: "Upload the PDF to your certs/ folder, update the title, issuer, date, and blurb, then add: pdf: \"certs/yourfile.pdf\""
  },
  {
    title: "Add Your Next Certificate",
    issuer: "Issuer Name",
    date: "2024",
    blurb: "Upload the PDF to your certs/ folder, update the title, issuer, date, and blurb, then add: pdf: \"certs/yourfile.pdf\""
  }
];

/* ── No need to edit below this line ── */

function placeholderSVG(title, issuer) {
  const safe = s => s.replace(/&/g,'&amp;').replace(/</g,'&lt;');
  return 'data:image/svg+xml;utf8,' + encodeURIComponent(`
    <svg xmlns="http://www.w3.org/2000/svg" width="600" height="450">
      <rect width="600" height="450" fill="#15110D"/>
      <rect x="20" y="20" width="560" height="410" fill="none" stroke="#332A22" stroke-width="1.5"/>
      <text x="300" y="195" font-family="JetBrains Mono,monospace" font-size="13" fill="#9C9085" text-anchor="middle" letter-spacing="2">CERTIFICATE</text>
      <text x="300" y="235" font-family="Inter,sans-serif" font-size="22" font-weight="700" fill="#F1E9DD" text-anchor="middle">${safe(title)}</text>
      <text x="300" y="266" font-family="JetBrains Mono,monospace" font-size="12" fill="#C98A33" text-anchor="middle">${safe(issuer.toUpperCase())}</text>
      <text x="300" y="310" font-family="JetBrains Mono,monospace" font-size="10" fill="#332A22" text-anchor="middle">PDF NOT YET UPLOADED</text>
    </svg>
  `);
}

async function renderPdfToCanvas(pdfUrl, canvas, scale) {
  try {
    const pdf = await pdfjsLib.getDocument(pdfUrl).promise;
    const page = await pdf.getPage(1);
    const viewport = page.getViewport({ scale });
    canvas.width = viewport.width;
    canvas.height = viewport.height;
    await page.render({ canvasContext: canvas.getContext('2d'), viewport }).promise;
  } catch(e) {
    console.warn('PDF render failed for', pdfUrl, e);
  }
}

const dlIcon = `<svg width="11" height="11" viewBox="0 0 14 14" fill="none"><path d="M7 1v8M4 6l3 3 3-3M2 11h10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>`;

const gallery     = document.getElementById('gallery');
const backdrop    = document.getElementById('backdrop');
const modalCanvas = document.getElementById('modalCanvas');
const modalImg    = document.getElementById('modalImg');
const modalTitle  = document.getElementById('modal-title');
const modalMeta   = document.getElementById('modalMeta');
const modalBlurb  = document.getElementById('modalBlurb');
const modalDlBtn  = document.getElementById('modalDlBtn');
const closeBtn    = document.getElementById('closeBtn');
let lastFocused   = null;

DATA.forEach((cert) => {
  const hasPdf   = !!cert.pdf;
  const hasImage = !!cert.image;

  const card = document.createElement('div');
  card.className = 'cert-card';
  card.tabIndex  = 0;
  card.setAttribute('role', 'button');
  card.setAttribute('aria-label', `View: ${cert.title}`);

  let thumbHTML;
  if (hasPdf && !hasImage) {
    thumbHTML = `
      <div class="card-thumb">
        <div class="pdf-loading">Loading…</div>
        <canvas class="pdf-thumb" style="display:none;width:100%;"></canvas>
      </div>`;
  } else {
    const src = cert.image || placeholderSVG(cert.title, cert.issuer);
    thumbHTML = `<div class="card-thumb"><img src="${src}" alt="${cert.title}" loading="lazy"></div>`;
  }

  card.innerHTML = `
    ${thumbHTML}
    <div class="card-body">
      <div class="card-top">
        <span class="type-badge">Certificate</span>
        <span class="card-date">${cert.date}</span>
      </div>
      <p class="card-title">${cert.title}</p>
      <p class="card-issuer">${cert.issuer}</p>
      ${hasPdf
        ? `<a class="dl-btn" href="${cert.pdf}" download>${dlIcon} Download PDF</a>`
        : `<span class="dl-btn disabled">${dlIcon} No PDF yet</span>`}
    </div>
  `;

  if (hasPdf && !hasImage) {
    const thumbCanvas = card.querySelector('.pdf-thumb');
    const loader      = card.querySelector('.pdf-loading');
    renderPdfToCanvas(cert.pdf, thumbCanvas, 1.2).then(() => {
      if (loader) loader.remove();
      thumbCanvas.style.display = 'block';
    });
  }

  const dlEl = card.querySelector('a.dl-btn');
  if (dlEl) dlEl.addEventListener('click', e => e.stopPropagation());

  function openModal() {
    lastFocused = document.activeElement;
    modalTitle.textContent = cert.title;
    modalMeta.textContent  = `${cert.issuer} · ${cert.date}`;
    modalBlurb.textContent = cert.blurb;

    if (hasPdf && !hasImage) {
      modalImg.style.display    = 'none';
      modalCanvas.style.display = 'block';
      renderPdfToCanvas(cert.pdf, modalCanvas, 2.5);
    } else {
      const src = cert.image || placeholderSVG(cert.title, cert.issuer);
      modalCanvas.style.display = 'none';
      modalImg.style.display    = 'block';
      modalImg.src = src;
      modalImg.alt = cert.title;
    }

    if (hasPdf) {
      modalDlBtn.href     = cert.pdf;
      modalDlBtn.download = cert.pdf.split('/').pop();
      modalDlBtn.classList.remove('hidden');
    } else {
      modalDlBtn.classList.add('hidden');
    }

    backdrop.classList.add('open');
    closeBtn.focus();
  }

  card.addEventListener('click', openModal);
  card.addEventListener('keydown', e => {
    if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); openModal(); }
  });

  gallery.appendChild(card);
});

function closeModal() {
  backdrop.classList.remove('open');
  if (lastFocused) lastFocused.focus();
}
closeBtn.addEventListener('click', closeModal);
backdrop.addEventListener('click', e => { if (e.target === backdrop) closeModal(); });
document.addEventListener('keydown', e => {
  if (e.key === 'Escape' && backdrop.classList.contains('open')) closeModal();
});
</script>
</body>
</html>
